name: Build Android APK

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # Provides the Android SDK (platform tools, platforms, build-tools) in
      # the CI runner -- no Android Studio needed, here or anywhere else.
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: project-dungeon-android-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk

      # On a version tag (e.g. "v1.0.0"), also publish the APK as a GitHub
      # Release asset -- a permanent, directly-downloadable link, unlike
      # workflow artifacts which expire after 90 days.
      - name: Create GitHub Release with APK
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/debug/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
